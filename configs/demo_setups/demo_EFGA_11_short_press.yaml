  FRANCE: "mistralai/mistral-nemo"
  GERMANY: "meta-llama/llama-3.1-8b-instruct"
  AUSTRIA: "meta-llama/llama-3.1-8b-instruct"

map_name: "configs/maps/EFGA_11.map"
max_years: 2
win_score: 11
shuffle_models: false
llm_seed: 1001
prompt_variant: "baseline_orders"
